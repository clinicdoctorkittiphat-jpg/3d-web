[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "https://clinicdoctorkittiphat.netlify.app/*"
  to = "https://www.clinicdoctorkittiphat.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' https://www.googletagmanager.com 'sha256-XTJnJAv66xpW8DOODCTqSe852I7+HaDbe7oXUorfkrg=' 'sha256-0dIXg+xD2mIYztuYnRIjOQhBJY9IPnKRv9m9SCP8WJU=' 'sha256-7sY9AcY8tWkWeLR+3xRCv7gjEHBH4nwf4DdT4eiP4gk=' 'sha256-hIaafPFFg62iMio+RChkO07TqpWsoZckCXM36ref/W0='; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://www.google-analytics.com https://www.googletagmanager.com; font-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://www.googletagmanager.com; frame-src https://maps.google.com https://www.google.com; navigate-to 'self' tel: https://line.me; upgrade-insecure-requests"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/index.html"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' https://www.googletagmanager.com 'sha256-XTJnJAv66xpW8DOODCTqSe852I7+HaDbe7oXUorfkrg=' 'sha256-0dIXg+xD2mIYztuYnRIjOQhBJY9IPnKRv9m9SCP8WJU=' 'sha256-7sY9AcY8tWkWeLR+3xRCv7gjEHBH4nwf4DdT4eiP4gk=' 'sha256-hIaafPFFg62iMio+RChkO07TqpWsoZckCXM36ref/W0='; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://www.google-analytics.com https://www.googletagmanager.com; font-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://www.googletagmanager.com; frame-src https://maps.google.com https://www.google.com; navigate-to 'self' tel: https://line.me; upgrade-insecure-requests"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), browsing-topics=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-Permitted-Cross-Domain-Policies = "none"
